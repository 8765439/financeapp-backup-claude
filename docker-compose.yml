services:
  postgres:
    image: postgres:16-alpine
    container_name: finance-pg
    restart: unless-stopped
    environment:
      POSTGRES_DB:       financeapp
      POSTGRES_USER:     finance
      POSTGRES_PASSWORD: finance123
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finance -d financeapp"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    container_name: finance-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL:      jdbc:postgresql://postgres:5432/financeapp
      SPRING_DATASOURCE_USERNAME: finance
      SPRING_DATASOURCE_PASSWORD: finance123
    ports:
      - "8080:8080"

  frontend:
    build: ./frontend
    container_name: finance-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:80"
    environment:
      VITE_API_BASE: http://backend:8080/api

volumes:
  pgdata:
